# render.yaml — Render Blueprint for LogisticsAI
# Docs: https://render.com/docs/blueprint-spec
#
# Provisions:
#   - PostgreSQL 16 managed database  (logistics-db)
#   - FastAPI backend web service     (logistics-backend)
#
# The frontend is deployed separately on Vercel (see README).

databases:
  - name: logistics-db
    databaseName: logistics
    user: logistics_user
    plan: free
    region: oregon

services:
  - type: web
    name: logistics-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python -m db.seed && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: logistics-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # set to your Vercel URL after frontend is deployed
      - key: PYTHON_VERSION
        value: "3.11.0"
